<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I3O Mobile RAT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="app-container">
    <header class="glass-card">
        <div class="header-top">
            <img src="logo_i3o.png" alt="Logo" class="app-logo" id="logoImg">
            <div class="header-title">
                <h1>SISTEMA I3O</h1>
                <p>Relatório de Assistência</p>
            </div>
        </div>

        <div class="input-grid">
            <div class="input-group">
                <label>Nº CLIENTE</label>
                <input type="text" id="numCliente" placeholder="Ex: 2024">
            </div>
            <div class="input-grid-inner">
                <div class="input-group"><label>DATA</label><input type="text" id="dataInput"></div>
                <div class="input-group"><label>HORA</label><input type="text" id="horaInput"></div>
            </div>
        </div>

        <div class="input-group full-width mt-15">
            <label>NOME DO CLIENTE</label>
            <input type="text" id="nomeCliente" class="input-destaque">
        </div>

        <div class="input-grid mt-15">
            <div class="input-group"><label>MORADA</label><input type="text" id="moradaCliente"></div>
            <div class="input-group"><label>LOCALIDADE</label><input type="text" id="localidadeCliente"></div>
            <div class="input-group"><label>CÓDIGO POSTAL</label><input type="text" id="codPostal" placeholder="0000-000"></div>
            <div class="input-group"><label>CONTACTO</label><input type="text" id="contactoNome"></div>
            <div class="input-group"><label>TELEMÓVEL</label><input type="tel" id="telemovel"></div>
        </div>
        /// AQUI
    </header>

    <section class="glass-card">
        <h3 class="section-title">⚙️ Equipamento</h3>
        <div class="input-grid">
            <div class="input-group"><label>EQUIPAMENTO</label><input type="text" id="equipamento"></div>
            <div class="input-group"><label>MARCA</label><input type="text" id="marca"></div>
            <div class="input-group"><label>MODELO</label><input type="text" id="modelo"></div>
            <div class="input-group"><label>Nº SÉRIE</label><input type="text" id="nSerie"></div>
        </div>
        <div class="input-group full-width mt-15">
            <label>AVARIA</label>
            <input type="text" id="avaria" class="input-destaque">
        </div>
    </section>

    <section class="glass-card">
        <h3 class="section-title">🛠️ Intervenção</h3>
        <label class="field-label">PEÇAS UTILIZADAS</label>
        <textarea id="pecas" rows="4"></textarea>

        <div class="stats-grid mt-15">
            <div class="stat-box">
                <label>MÃO DE OBRA</label>
                <div class="unit-group"><input type="text" id="maoObra"> <span>H</span></div>
            </div>
            <div class="stat-box">
                <label>DESLOCAÇÃO</label>
                <div class="unit-group"><input type="text" id="deslocacao"> <span>kms</span></div>
            </div>
        </div>

        <label class="field-label mt-15">RELATÓRIO TÉCNICO</label>
        <textarea id="relatorio" rows="5"></textarea>

        <div class="input-group mt-15">
            <label>TÉCNICO</label>
            <select id="tecnico">
                <option>Eurico Mota</option>
                <option>André Silva</option>
                <option>Carlos Gomes</option>
            </select>
        </div>
    </section>

    <div class="signature-container">
        <div class="glass-card sig-card">
            <label>ASSINATURA TÉCNICO</label>
            <canvas id="padTecnico"></canvas>
            <button onclick="limpar('padTecnico')">Limpar</button>
        </div>
        <div class="glass-card sig-card">
            <label>ASSINATURA CLIENTE</label>
            <canvas id="padCliente"></canvas>
            <button onclick="limpar('padCliente')">Limpar</button>
        </div>
    </div>

    <button class="btn-submit" onclick="gerarPDF()">GERAR PDF</button>
</div>

<script src="script.js"></script>
</body>
</html>
